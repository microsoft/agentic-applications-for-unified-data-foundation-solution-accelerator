name: Post-Deployment Job

on:
  workflow_call:
    inputs:
      ENV_NAME:
        required: true
        type: string
      RESOURCE_GROUP_NAME:
        required: true
        type: string
      AZURE_LOCATION:
        required: true
        type: string
      AZURE_ENV_OPENAI_LOCATION:
        required: false
        type: string
        default: ''
      BACKEND_RUNTIME_STACK:
        required: false
        type: string
        default: 'python'
      USE_CASE:
        required: false
        type: string
        default: 'Retail-sales-analysis'

jobs:
  post-deploy:
    name: Run Post-Deployment Scripts
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Validate Workflow Input Parameters
        shell: bash
        env:
          INPUT_ENV_NAME: ${{ inputs.ENV_NAME }}
          INPUT_RESOURCE_GROUP_NAME: ${{ inputs.RESOURCE_GROUP_NAME }}
          INPUT_AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
        run: |
          echo "🔍 Validating workflow input parameters..."
          VALIDATION_FAILED=false

          # Validate ENV_NAME (required, alphanumeric and hyphens)
          if [[ -z "$INPUT_ENV_NAME" ]]; then
            echo "❌ ERROR: ENV_NAME is required but not provided"
            VALIDATION_FAILED=true
          elif [[ ! "$INPUT_ENV_NAME" =~ ^[a-zA-Z0-9-]+$ ]]; then
            echo "❌ ERROR: ENV_NAME '$INPUT_ENV_NAME' is invalid. Must contain only alphanumerics and hyphens"
            VALIDATION_FAILED=true
          else
            echo "✅ ENV_NAME: '$INPUT_ENV_NAME' is valid"
          fi

          # Validate RESOURCE_GROUP_NAME (required, Azure naming convention)
          if [[ -z "$INPUT_RESOURCE_GROUP_NAME" ]]; then
            echo "❌ ERROR: RESOURCE_GROUP_NAME is required but not provided"
            VALIDATION_FAILED=true
          elif [[ ! "$INPUT_RESOURCE_GROUP_NAME" =~ ^[a-zA-Z0-9._\(\)-]+$ ]] || [[ "$INPUT_RESOURCE_GROUP_NAME" =~ \.$ ]]; then
            echo "❌ ERROR: RESOURCE_GROUP_NAME '$INPUT_RESOURCE_GROUP_NAME' is invalid. Must contain only alphanumerics, periods, underscores, hyphens, and parentheses. Cannot end with period."
            VALIDATION_FAILED=true
          else
            echo "✅ RESOURCE_GROUP_NAME: '$INPUT_RESOURCE_GROUP_NAME' is valid"
          fi

          # Validate AZURE_LOCATION (required, Azure region format)
          if [[ -z "$INPUT_AZURE_LOCATION" ]]; then
            echo "❌ ERROR: AZURE_LOCATION is required but not provided"
            VALIDATION_FAILED=true
          elif [[ ! "$INPUT_AZURE_LOCATION" =~ ^[a-z0-9]+$ ]]; then
            echo "❌ ERROR: AZURE_LOCATION '$INPUT_AZURE_LOCATION' is invalid. Must contain only lowercase letters and numbers"
            VALIDATION_FAILED=true
          else
            echo "✅ AZURE_LOCATION: '$INPUT_AZURE_LOCATION' is valid"
          fi

          if [[ "$VALIDATION_FAILED" == "true" ]]; then
            echo ""
            echo "❌ Parameter validation failed. Please correct the errors above and try again."
            exit 1
          fi

          echo ""
          echo "✅ All input parameters validated successfully!"

      - name: Install ODBC Driver 18 for SQL Server
        shell: bash
        run: |
          if ! [[ "18.04 20.04 22.04 24.04 24.10" == *"$(grep VERSION_ID /etc/os-release | cut -d '"' -f 2)"* ]];
          then
              echo "Ubuntu $(grep VERSION_ID /etc/os-release | cut -d '"' -f 2) is not currently supported.";
              exit;
          fi

          # Download the package to configure the Microsoft repo
          curl -fsSL -O https://packages.microsoft.com/config/ubuntu/$(grep VERSION_ID /etc/os-release | cut -d '"' -f 2)/packages-microsoft-prod.deb || { echo "Failed to download Microsoft packages config"; exit 1; }
          # Install the package
          sudo dpkg -i packages-microsoft-prod.deb
          # Delete the file
          rm packages-microsoft-prod.deb

          # Install the driver
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Login to Azure using OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to AZD
        shell: bash
        run: azd auth login --client-id ${{ secrets.AZURE_CLIENT_ID }} --federated-credential-provider "github" --tenant-id ${{ secrets.AZURE_TENANT_ID }}

      - name: Hydrate azd Environment from Resource Group
        shell: bash
        env:
          ENV_NAME: ${{ inputs.ENV_NAME }}
          RESOURCE_GROUP_NAME: ${{ inputs.RESOURCE_GROUP_NAME }}
          AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
          AZURE_ENV_OPENAI_LOCATION: ${{ inputs.AZURE_ENV_OPENAI_LOCATION }}
          BACKEND_RUNTIME_STACK: ${{ inputs.BACKEND_RUNTIME_STACK }}
          USE_CASE: ${{ inputs.USE_CASE }}
        run: |
          set -e

          echo "Creating azd environment '$ENV_NAME'..."
          azd env new "$ENV_NAME" --no-prompt

          echo "Setting default subscription..."
          azd config set defaults.subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Provide the coordinates azd needs to locate the existing deployment in the resource group
          azd env set AZURE_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          azd env set AZURE_RESOURCE_GROUP="$RESOURCE_GROUP_NAME"
          azd env set AZURE_LOCATION="$AZURE_LOCATION"
          if [[ -n "$AZURE_ENV_OPENAI_LOCATION" ]]; then
            azd env set AZURE_ENV_AI_SERVICE_LOCATION="$AZURE_ENV_OPENAI_LOCATION"
          fi
          azd env set BACKEND_RUNTIME_STACK="$BACKEND_RUNTIME_STACK"
          azd env set USE_CASE="$USE_CASE"
          azd env set DEPLOYING_USER_PRINCIPAL_TYPE="ServicePrincipal"

          # Fetch deployment outputs (endpoints, FABRIC_WORKSPACE_ID, SOLUTION_NAME, etc.)
          # from the resource group's last deployment into .azure/<env>/.env
          echo "Refreshing azd environment values from resource group '$RESOURCE_GROUP_NAME'..."
          azd env refresh --no-prompt

          echo "Resolved environment values:"
          azd env get-values

      - name: Generate Post-Deployment Job Summary
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          RESOURCE_GROUP_NAME: ${{ inputs.RESOURCE_GROUP_NAME }}
          ENV_NAME: ${{ inputs.ENV_NAME }}
        run: |
          echo "## 🔧 Post-Deployment Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Job Status** | $([ "$JOB_STATUS" == "success" ] && echo "✅ Success" || echo "❌ Failed") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource Group** | \`$RESOURCE_GROUP_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment Name** | \`$ENV_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$JOB_STATUS" == "success" ]]; then
            echo "### ✅ Post-Deployment Details" >> $GITHUB_STEP_SUMMARY
            echo "- Environment values hydrated from the resource group via \`azd env refresh\`" >> $GITHUB_STEP_SUMMARY
            echo "- Agent creation and Fabric item scripts executed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Post-Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "- One or more post-deployment scripts encountered an error" >> $GITHUB_STEP_SUMMARY
            echo "- Check the job logs for detailed error information" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Logout from Azure
        if: always()
        shell: bash
        run: |
          az logout || true
          echo "Logged out from Azure."
