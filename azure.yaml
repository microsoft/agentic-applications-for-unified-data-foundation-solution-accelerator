# # yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# metadata:
#     template: azd-init@1.11.1
environment:
  name: agentic-applications-for-unified-data-foundation
  location: eastus
name: agentic-applications-for-unified-data-foundation

requiredVersions:
  azd: ">= 1.15.0 != 1.23.9"

metadata:
  template: agentic-applications-for-unified-data-foundation@1.1

hooks:
  postprovision:
    windows:
      run: |
        $deployApp = $env:AZURE_ENV_DEPLOY_APP

        if ($deployApp -ne "false") {
            Write-Host "Web app URL: "
            Write-Host "$env:WEB_APP_URL" -ForegroundColor Cyan
        }

      shell: pwsh
      continueOnError: false
      interactive: true
    posix:
      run: |
        if [ "$AZURE_ENV_DEPLOY_APP" != "false" ]; then
            echo "Web app URL: "
            echo $WEB_APP_URL
            echo ""
        fi

      shell: sh
      continueOnError: false
      interactive: true