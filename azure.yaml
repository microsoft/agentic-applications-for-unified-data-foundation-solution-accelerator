# # yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# metadata:
#     template: azd-init@1.11.1
environment:
  name: agentic-applications-for-unified-data-foundation
  location: eastus
name: agentic-applications-for-unified-data-foundation

requiredVersions:
  azd: ">= 1.15.0 != 1.23.9"

metadata:
  template: agentic-applications-for-unified-data-foundation@1.1

hooks:
  predown:
    windows:
      run: |
        $createWorkspace = $env:CREATE_FABRIC_WORKSPACE
        if ($createWorkspace -eq "true") {
            $isWorkshop = $env:IS_WORKSHOP
            if ($isWorkshop -eq "true") {
                python scripts/02_create_fabric_items.py --cleanup --yes
            } else {
                python infra/scripts/post-provision/fabric_scripts/create_fabric_items.py --cleanup --yes
            }
        } else {
            Write-Host "Skipping Fabric workspace cleanup (CREATE_FABRIC_WORKSPACE is not true)."
        }
      shell: pwsh
      continueOnError: true
      interactive: true
    posix:
      run: |
        if [ "${CREATE_FABRIC_WORKSPACE:-}" = "true" ]; then
            if [ "${IS_WORKSHOP:-}" = "true" ]; then
                python scripts/02_create_fabric_items.py --cleanup --yes
            else
                python infra/scripts/post-provision/fabric_scripts/create_fabric_items.py --cleanup --yes
            fi
        else
            echo "Skipping Fabric workspace cleanup (CREATE_FABRIC_WORKSPACE is not true)."
        fi
      shell: sh
      continueOnError: true
      interactive: true
  postprovision:
    windows:
      run: |
        $isWorkshop = $env:IS_WORKSHOP
        $deployApp = $env:AZURE_ENV_DEPLOY_APP

        if (-not ($isWorkshop -eq "true" -and $deployApp -ne "true")) {
            Write-Host "Web app URL: "
            Write-Host "$env:WEB_APP_URL" -ForegroundColor Cyan
        }
        if ($isWorkshop -eq "true") {
            Write-Host ""
        } else {
            Write-Host "`nRun the following commands in the bash terminal:"
            Write-Host "1. Create agents:"
            Write-Host "bash ./infra/scripts/post-provision/agent_scripts/run_create_agents_scripts.sh" -ForegroundColor Cyan

            Write-Host "`n2. Create Fabric items:"
            if ($env:CREATE_FABRIC_WORKSPACE -eq "true") {
                Write-Host "bash ./infra/scripts/post-provision/fabric_scripts/run_fabric_items_scripts.sh" -ForegroundColor Cyan
            } else {
                Write-Host "bash ./infra/scripts/post-provision/fabric_scripts/run_fabric_items_scripts.sh <fabric_workspace_id>" -ForegroundColor Cyan
            }
        }

      shell: pwsh
      continueOnError: false
      interactive: true
    posix:
      run: |
        if [ "$IS_WORKSHOP" != "true" ] || [ "$AZURE_ENV_DEPLOY_APP" = "true" ]; then
            echo "Web app URL: "
            echo $WEB_APP_URL
            echo ""
        fi

        if [ "$IS_WORKSHOP" = "true" ]; then
            echo ""
        else
            echo "Run the following commands in the bash terminal:"
            echo "1. Create agents:"
            echo "bash ./infra/scripts/post-provision/agent_scripts/run_create_agents_scripts.sh"
            echo ""
            echo "2. Create Fabric items:"
            if [ "${CREATE_FABRIC_WORKSPACE:-}" = "true" ]; then
                echo "bash ./infra/scripts/post-provision/fabric_scripts/run_fabric_items_scripts.sh"
            else
                echo "bash ./infra/scripts/post-provision/fabric_scripts/run_fabric_items_scripts.sh <fabric_workspace_id>"
            fi
        fi

      shell: sh
      continueOnError: false
      interactive: true