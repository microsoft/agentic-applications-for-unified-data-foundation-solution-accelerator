# # yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# metadata:
#     template: azd-init@1.11.1
environment:
  name: agentic-applications-for-unified-data-foundation
  location: eastus
name: agentic-applications-for-unified-data-foundation

requiredVersions:
  azd: ">= 1.15.0 != 1.23.9"

metadata:
  template: agentic-applications-for-unified-data-foundation@1.1

hooks:
  preprovision:
    windows:
      run: |
        Write-Host "Checking Azure OpenAI quota for required models before provisioning..." -ForegroundColor Cyan
        if (-not (Get-Command az -ErrorAction SilentlyContinue)) {
            Write-Host "Azure CLI ('az') not found on PATH. Install it from https://aka.ms/installazurecliwindows, then run 'az login' and retry." -ForegroundColor Red
            exit 1
        }
        az account show --only-show-errors 1>$null 2>$null
        if ($LASTEXITCODE -ne 0) {
            Write-Host "Azure CLI is not logged in. Run 'az login' (and 'az account set --subscription <id>' if needed), then retry." -ForegroundColor Red
            exit 1
        }
        if (-not $env:AZURE_SUBSCRIPTION_ID) {
            $env:AZURE_SUBSCRIPTION_ID = (az account show --query id -o tsv).Trim()
        }
        $bashPath = $null
        $candidates = @(
            "$env:ProgramFiles\Git\bin\bash.exe",
            "${env:ProgramFiles(x86)}\Git\bin\bash.exe",
            "$env:LOCALAPPDATA\Programs\Git\bin\bash.exe"
        )
        foreach ($c in $candidates) { if ($c -and (Test-Path $c)) { $bashPath = $c; break } }
        if (-not $bashPath) {
            $cmd = Get-Command bash.exe -ErrorAction SilentlyContinue | Where-Object { $_.Source -notlike '*System32*' } | Select-Object -First 1
            if ($cmd) { $bashPath = $cmd.Source }
        }
        if (-not $bashPath) {
            Write-Host "bash not found. Install Git for Windows (https://git-scm.com/download/win) or run from WSL/Cloud Shell." -ForegroundColor Red
            exit 1
        }
        & $bashPath ./infra/scripts/quota_check_params.sh
        if ($LASTEXITCODE -ne 0) {
            Write-Host "Quota check failed. Aborting provisioning." -ForegroundColor Red
            exit $LASTEXITCODE
        }
      shell: pwsh
      continueOnError: false
      interactive: false
    posix:
      run: |
        echo "Checking Azure OpenAI quota for required models before provisioning..."
        if ! command -v az >/dev/null 2>&1; then
          echo "Azure CLI ('az') not found on PATH. Install it from https://aka.ms/InstallAzureCli, then run 'az login' and retry." >&2
          exit 1
        fi
        if ! az account show --only-show-errors >/dev/null 2>&1; then
          echo "Azure CLI is not logged in. Run 'az login' (and 'az account set --subscription <id>' if needed), then retry." >&2
          exit 1
        fi
        if [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
          export AZURE_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
        fi
        chmod +x ./infra/scripts/quota_check_params.sh
        ./infra/scripts/quota_check_params.sh
      shell: sh
      continueOnError: false
      interactive: false
  postprovision:
    windows:
      run: |
        $isWorkshop = $env:IS_WORKSHOP
        $deployApp = $env:AZURE_ENV_DEPLOY_APP

        if (-not ($isWorkshop -eq "true" -and $deployApp -ne "true")) {
            Write-Host "Web app URL: "
            Write-Host "$env:WEB_APP_URL" -ForegroundColor Cyan
        }
        if ($isWorkshop -eq "true") {
            Write-Host ""
        } else {
            Write-Host "`nRun the following commands in the bash terminal:"
            Write-Host "1. Create agents:"
            Write-Host "bash ./infra/scripts/agent_scripts/run_create_agents_scripts.sh" -ForegroundColor Cyan

            Write-Host "`n2. Create Fabric items:"
            Write-Host "bash ./infra/scripts/fabric_scripts/run_fabric_items_scripts.sh <fabric_workspace_id>" -ForegroundColor Cyan
        }

      shell: pwsh
      continueOnError: false
      interactive: true
    posix:
      run: |
        if [ "$IS_WORKSHOP" != "true" ] || [ "$AZURE_ENV_DEPLOY_APP" = "true" ]; then
            echo "Web app URL: "
            echo $WEB_APP_URL
            echo ""
        fi

        if [ "$IS_WORKSHOP" = "true" ]; then
            echo ""
        else
            echo "Run the following commands in the bash terminal:"
            echo "1. Create agents:"
            echo "bash ./infra/scripts/agent_scripts/run_create_agents_scripts.sh"
            echo ""
            echo "2. Create Fabric items:"
            echo "bash ./infra/scripts/fabric_scripts/run_fabric_items_scripts.sh <fabric_workspace_id>"
        fi

      shell: sh
      continueOnError: false
      interactive: true